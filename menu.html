<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Menu | Maa Ruchi Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */

body {
  margin:0;
  background:#0c0c0c;
  color:white;
  font-family:'Poppins', sans-serif;
}

h1,h2 {
  font-family:'Playfair Display', serif;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:120px 20px 80px;
}

/* ---------- HEADER ---------- */

.menu-header {
  text-align:center;
  margin-bottom:60px;
}

.menu-header h1 {
  font-size:42px;
  letter-spacing:5px;
}

.menu-header p {
  color:#d4af37;
}

/* ---------- FILTER BUTTONS ---------- */

.filters {
  text-align:center;
  margin-bottom:50px;
}

.filters button {
  border:1px solid #d4af37;
  background:none;
  color:#d4af37;
  padding:8px 20px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
}

.filters button:hover {
  background:#d4af37;
  color:black;
}

/* ---------- CATEGORY SECTION ---------- */

.menu-section {
  margin-bottom:70px;
}

/* Category image banner */
.category-banner {
  height:220px;
  background-size:cover;
  background-position:center;
  border-radius:10px;
  margin-bottom:20px;
}

/* Section title */
.menu-section h2 {
  font-size:28px;
  margin-bottom:20px;
  position:relative;
}

/* Gold underline */
.menu-section h2::after {
  content:"";
  display:block;
  width:80px;
  height:2px;
  background:#d4af37;
  margin-top:10px;
}

/* ---------- MENU ITEMS ---------- */

.menu-item {
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.menu-item:hover {
  padding-left:10px;
  background:rgba(212,175,55,0.05);
}

.icon {
  margin-right:8px;
}

.price {
  color:#d4af37;
  font-weight:500;
}

/* Chef Badge */
.badge {
  background:#d4af37;
  color:black;
  font-size:12px;
  padding:2px 6px;
  margin-left:10px;
  border-radius:4px;
}

/* Back */
.back {
  text-align:center;
  margin-top:80px;
}

.back a {
  border:1px solid #d4af37;
  color:#d4af37;
  padding:10px 25px;
  text-decoration:none;
  transition:0.3s;
}

.back a:hover {
  background:#d4af37;
  color:black;
}

</style>
</head>

<body>

<div class="container">

<div class="menu-header">
  <h1>MAA RUCHI FOODS</h1>
  <p>Royal Hyderabadi Menu</p>
</div>

<!-- FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterMenu('all')">All</button>
  <button onclick="filterMenu('veg')">Veg 🌿</button>
  <button onclick="filterMenu('nonveg')">Non-Veg 🍗</button>
</div>

<!-- VEG BIRYANI -->
<div class="menu-section">
  <div class="category-banner" style="background-image:url('veg-biryani.jpg');"></div>
  <h2>Veg Biryani 🌿</h2>

  <div class="menu-item veg">
    <div><span class="icon">🌿</span>Veg Biryani Regular <span class="badge">Chef Recommended</span></div>
    <div class="price">₹149</div>
  </div>

  <div class="menu-item veg">
    <div><span class="icon">🌿</span>Paneer Biryani</div>
    <div class="price">₹199</div>
  </div>
</div>

<!-- CHICKEN -->
<div class="menu-section">
  <div class="category-banner" style="background-image:url('chicken-biryani.jpg');"></div>
  <h2>Chicken Biryani 🍗</h2>

  <div class="menu-item nonveg">
    <div><span class="icon">🍗</span>Chicken Biryani Regular <span class="badge">Most Popular</span></div>
    <div class="price">₹189</div>
  </div>

  <div class="menu-item nonveg">
    <div><span class="icon">🍗</span>Chicken Pepper Biryani</div>
    <div class="price">₹199</div>
  </div>
</div>

<!-- MUTTON -->
<div class="menu-section">
  <div class="category-banner" style="background-image:url('mutton-biryani.jpg');"></div>
  <h2>Mutton Biryani 🥩</h2>

  <div class="menu-item nonveg">
    <div><span class="icon">🥩</span>Mutton Biryani Regular</div>
    <div class="price">₹229</div>
  </div>
</div>

<div class="back">
  <a href="index.html">← Back to Home</a>
</div>

</div>

<script>

/* Veg / Non-Veg Filter */
function filterMenu(type){
  const items = document.querySelectorAll('.menu-item');
  items.forEach(item=>{
    if(type === "all"){
      item.style.display = "flex";
    } else if(item.classList.contains(type)){
      item.style.display = "flex";
    } else {
      item.style.display = "none";
    }
  });
}

</script>

</body>
</html>
