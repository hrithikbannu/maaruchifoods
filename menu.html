<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Menu | Maa Ruchi Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */

body {
  margin:0;
  background:#0c0c0c;
  color:white;
  font-family:'Poppins', sans-serif;
}

h1,h2 {
  font-family:'Playfair Display', serif;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:120px 20px 80px;
}

/* ---------- HEADER ---------- */

.menu-header {
  text-align:center;
  margin-bottom:60px;
}

.menu-header h1 {
  font-size:42px;
  letter-spacing:5px;
}

.menu-header p {
  color:#d4af37;
}

/* ---------- FILTER BUTTONS ---------- */

.filters {
  text-align:center;
  margin-bottom:40px;
}

.filters button {
  border:1px solid #d4af37;
  background:none;
  color:#d4af37;
  padding:8px 20px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
}

.filters button:hover {
  background:#d4af37;
  color:black;
}

/* ---------- MENU SECTIONS ---------- */

.menu-section {
  margin-bottom:50px;
  border:1px solid rgba(212,175,55,0.15);
  border-radius:8px;
  overflow:hidden;
}

/* Category image banner */
.category-banner {
  height:180px;
  background-size:cover;
  background-position:center;
}

/* Section header (clickable) */
.section-header {
  background:#111;
  padding:15px 20px;
  cursor:pointer;
  font-size:22px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.section-header:hover {
  background:#1a1a1a;
}

.section-header span {
  color:#d4af37;
}

/* Items container */
.menu-items {
  display:none;
  padding:15px 20px;
  background:#141414;
}

/* Menu item row */
.menu-item {
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.menu-item:hover {
  padding-left:10px;
  background:rgba(212,175,55,0.05);
}

/* Icons */
.icon {
  margin-right:8px;
}

/* Price */
.price {
  color:#d4af37;
}

/* Chef Badge */
.badge {
  background:#d4af37;
  color:black;
  font-size:12px;
  padding:2px 6px;
  margin-left:10px;
  border-radius:4px;
}

/* Back */
.back {
  text-align:center;
  margin-top:60px;
}

.back a {
  border:1px solid #d4af37;
  color:#d4af37;
  padding:10px 25px;
  text-decoration:none;
}

.back a:hover {
  background:#d4af37;
  color:black;
}

</style>
</head>

<body>

<div class="container">

<div class="menu-header">
  <h1>MAA RUCHI FOODS</h1>
  <p>Royal Hyderabadi Menu</p>
</div>

<!-- FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterMenu('all')">All</button>
  <button onclick="filterMenu('veg')">Veg 🌿</button>
  <button onclick="filterMenu('nonveg')">Non-Veg 🍗</button>
</div>

<!-- VEG BIRYANI SECTION -->
<div class="menu-section">

  <div class="category-banner" style="background-image:url('veg-biryani.jpg');"></div>

  <div class="section-header" onclick="toggleSection(this)">
    Veg Biryani 🌿
    <span>+</span>
  </div>

  <div class="menu-items">
    <div class="menu-item veg">
      <div><span class="icon">🌿</span>Veg Biryani Regular <span class="badge">Chef Recommended</span></div>
      <div class="price">₹149</div>
    </div>
    <div class="menu-item veg">
      <div><span class="icon">🌿</span>Paneer Biryani</div>
      <div class="price">₹199</div>
    </div>
  </div>
</div>

<!-- CHICKEN SECTION -->
<div class="menu-section">

  <div class="category-banner" style="background-image:url('chicken-biryani.jpg');"></div>

  <div class="section-header" onclick="toggleSection(this)">
    Chicken Biryani 🍗
    <span>+</span>
  </div>

  <div class="menu-items">
    <div class="menu-item nonveg">
      <div><span class="icon">🍗</span>Chicken Biryani Regular <span class="badge">Most Popular</span></div>
      <div class="price">₹189</div>
    </div>
    <div class="menu-item nonveg">
      <div><span class="icon">🍗</span>Chicken Pepper Biryani</div>
      <div class="price">₹199</div>
    </div>
  </div>
</div>

<!-- MUTTON SECTION -->
<div class="menu-section">

  <div class="category-banner" style="background-image:url('mutton-biryani.jpg');"></div>

  <div class="section-header" onclick="toggleSection(this)">
    Mutton Biryani 🥩
    <span>+</span>
  </div>

  <div class="menu-items">
    <div class="menu-item nonveg">
      <div><span class="icon">🥩</span>Mutton Biryani Regular</div>
      <div class="price">₹229</div>
    </div>
  </div>
</div>

<div class="back">
  <a href="index.html">← Back to Home</a>
</div>

</div>

<script>

/* Expand / Collapse */
function toggleSection(header){
  const items = header.nextElementSibling;
  const symbol = header.querySelector("span");
  if(items.style.display === "block"){
    items.style.display = "none";
    symbol.textContent = "+";
  } else {
    items.style.display = "block";
    symbol.textContent = "−";
  }
}

/* Veg / Non-Veg Filter */
function filterMenu(type){
  const items = document.querySelectorAll('.menu-item');
  items.forEach(item=>{
    if(type === "all"){
      item.style.display = "flex";
    } else if(item.classList.contains(type)){
      item.style.display = "flex";
    } else {
      item.style.display = "none";
    }
  });
}

</script>

</body>
</html>
