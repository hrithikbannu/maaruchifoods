<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | Maa Ruchi Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Poppins', sans-serif;
  color:white;
  overflow-x:hidden;
}

/* ===== CINEMATIC BACKGROUND ===== */

.background{
  position:fixed;
  inset:0;
  z-index:-2;
}

.bg-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(1);
  animation:fadeZoom 30s infinite;
}

.bg1{background-image:url('biryani1.jpg'); animation-delay:0s;}
.bg2{background-image:url('biryani2.jpg'); animation-delay:10s;}
.bg3{background-image:url('biryani3.jpg'); animation-delay:20s;}

@keyframes fadeZoom{
  0%{opacity:0; transform:scale(1);}
  5%{opacity:1;}
  30%{opacity:1; transform:scale(1.08);}
  35%{opacity:0;}
  100%{opacity:0;}
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  z-index:-1;
}

/* ===== MENU CONTENT ===== */

.container{
  max-width:1100px;
  margin:auto;
  padding:120px 20px;
}

h1{
  text-align:center;
  font-family:'Playfair Display', serif;
  font-size:42px;
  letter-spacing:6px;
}

.menu-section{
  margin-top:60px;
}

.menu-section h2{
  font-family:'Playfair Display', serif;
  font-size:28px;
}

.menu-item{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.price{
  color:#d4af37;
}

</style>
</head>

<body>

<div class="background">
  <div class="bg-slide bg1"></div>
  <div class="bg-slide bg2"></div>
  <div class="bg-slide bg3"></div>
</div>

<div class="overlay"></div>

<div class="container">

<h1>MAA RUCHI FOODS</h1>

<div class="menu-section">
<h2>Veg Starters</h2>
<div class="menu-item"><span>Paneer Fry (500ml)</span><span class="price">₹150</span></div>
<div class="menu-item"><span>Mushroom Fry (500ml)</span><span class="price">₹150</span></div>
<div class="menu-item"><span>Crispy Corn (500ml)</span><span class="price">₹200</span></div>
</div>

<!-- Keep all your other original menu items here exactly same -->

</div>

</body>
</html>
