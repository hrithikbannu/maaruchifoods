<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maa Ruchi Foods | Taste of Tradition</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
html { scroll-behavior:smooth; }
body { margin:0; font-family:'Poppins', sans-serif; background:#111; color:white; }

/* ===== NAVBAR ===== */
nav{
  position:fixed;
  width:100%;
  top:0;
  background:rgba(0,0,0,0.9);
  padding:15px 0;
  text-align:center;
  z-index:1000;
}
nav a{
  color:#d4af37;
  margin:0 20px;
  text-decoration:none;
  font-weight:500;
}
nav a:hover{ color:white; }

/* ===== CINEMATIC HERO ===== */
.hero{
  position:relative;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

/* Slides */
.hero-slide{
  position:absolute;
  inset:0;
  background-size:cover;
  background-position:center;
  opacity:0;
  transform:scale(1);
  animation:fadeZoom 30s infinite;
}

/* Individual slides */
.slide1{ background-image:url('biryani1.jpg'); animation-delay:0s; }
.slide2{ background-image:url('biryani2.jpg'); animation-delay:10s; }
.slide3{ background-image:url('biryani3.jpg'); animation-delay:20s; }

/* Fade + Zoom */
@keyframes fadeZoom{
  0%{opacity:0; transform:scale(1);}
  5%{opacity:1;}
  30%{opacity:1; transform:scale(1.08);}
  35%{opacity:0;}
  100%{opacity:0;}
}

/* Overlay */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
  z-index:1;
}

/* Hero Text */
.hero h1,
.hero h2,
.hero .buttons{
  position:relative;
  z-index:2;
}

.hero h1{
  font-family:'Playfair Display', serif;
  font-size:38px;
  letter-spacing:6px;
  text-shadow:0 0 20px rgba(0,0,0,0.9);
}
.hero h2{
  font-family:'Playfair Display', serif;
  font-size:64px;
  margin:10px 0;
  text-shadow:0 0 25px rgba(0,0,0,0.9);
}

/* Buttons */
.buttons a{
  display:inline-block;
  margin:10px;
  padding:12px 26px;
  border:1px solid #d4af37;
  color:#d4af37;
  text-decoration:none;
  transition:0.3s;
}
.buttons a:hover{
  background:#d4af37;
  color:black;
}

/* ===== SECTIONS ===== */
.section{
  padding:100px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}
.section.visible{
  opacity:1;
  transform:translateY(0);
}
.section h3{
  font-family:'Playfair Display', serif;
  font-size:32px;
}
.section h3::after{
  content:"";
  display:block;
  width:80px;
  height:2px;
  margin:15px auto;
  background:#d4af37;
}

/* Grid */
.food-grid,.insta-grid{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
}
.food-grid img,.insta-grid img{
  width:300px;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  transition:0.3s;
}
.food-grid img:hover,
.insta-grid img:hover{
  transform:scale(1.05);
}

footer{
  background:black;
  padding:50px;
  text-align:center;
  color:#aaa;
}

</style>
</head>

<body>

<nav>
  <a href="#home">Home</a>
  <a href="#special">Specialties</a>
  <a href="#menu">Menu</a>
  <a href="#gallery">Gallery</a>
  <a href="#reviews">Reviews</a>
  <a href="#contact">Contact</a>
</nav>

<div class="hero" id="home">
  <div class="hero-slide slide1"></div>
  <div class="hero-slide slide2"></div>
  <div class="hero-slide slide3"></div>

  <h1>MAA RUCHI FOODS</h1>
  <h2>Taste of Tradition</h2>

  <div class="buttons">
    <a href="menu.html">View Menu</a>
  </div>
</div>

<div class="section" id="special">
  <h3>Our Specialties</h3>
</div>

<footer>
© 2026 Maa Ruchi Foods
</footer>

<script>
const sections=document.querySelectorAll('.section');
window.addEventListener('scroll',()=>{
  const trigger=window.innerHeight*0.85;
  sections.forEach(section=>{
    if(section.getBoundingClientRect().top<trigger){
      section.classList.add('visible');
    }
  });
});
</script>

</body>
</html>
